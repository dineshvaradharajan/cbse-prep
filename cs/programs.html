<script>
const ICONS = {'File Handling':'📄','Binary File':'💾','CSV File':'📊','Stack':'📚','Python Functions':'🐍','SQL':'🗃️'};

/* Check if program needs file I/O (text files — we can simulate these) */
function needsFileIO(prog) {
  const code = (prog.code || '');
  return /\bopen\s*\(/.test(code) && !/\bimport\s+(pickle|csv)/.test(code.toLowerCase());
}

/* Check if program truly can't run (pickle, csv, mysql, SQL-only) */
function isTrulyUnrunnable(prog) {
  const code = (prog.code || '').toLowerCase();
  if (/\bimport\s+(pickle|csv|mysql)/.test(code)) return true;
  if (/\bfrom\s+(pickle|csv|mysql)/.test(code)) return true;
  if (/\b(cursor|execute|connect)\b/.test(code) && /\b(mysql|sql)\b/.test(code)) return true;
  // SQL-only programs (no Python)
  if (/^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP)\b/im.test(code) && !/\bdef\b/.test(code) && !/\bprint\b/.test(code)) return true;
  return false;
}

/* Extract filename from code like open("NOTES.TXT") or open('Elections.txt') */
function extractFilenames(code) {
  const matches = code.match(/open\s*\(\s*["']([^"']+)["']/g) || [];
  const names = matches.map(m => {
    const f = m.match(/["']([^"']+)["']/);
    return f ? f[1] : null;
  }).filter(Boolean);
  return [...new Set(names)];
}

/* Default sample content for common file names */
const SAMPLE_FILES = {
  'NOTES.TXT': 'This is a sample file.\nThe file contains many sentences.\nPython is easy to learn.\nData handling is important.\nPractice makes perfect.',
  'Elections.txt': 'In an election many people vote to choose their representative.\nThe candidate getting the maximum share of votes stands elected.\nNormally one person has to vote once.\nThe process of voting may vary with time and region.',
  'Report.txt': 'Once there was a wise man in a village.\nHe was an awesome story-teller.\nHe was able to keep people anchored while listening to him.',
  'testfile.txt': 'Hello everyone\nWelcome to Python programming\nThis is a test file\nPython is fun to learn',
  'practice.txt': 'Computer Science is interesting\nPython makes coding easy\nData structures are fundamental',
  'hello.txt': 'Welcome my class\nIt is a fun place\nYou will learn and play',
};

/* Build a skeleton comment for the Try It Yourself editor */
function buildSkeleton(prog) {
  const lines = ['# Write your code here'];
  if (prog.title) lines.push('# Task: ' + prog.title);
  lines.push('');
  return lines.join('\n');
}

fetch('../data/cs/programs-bank.json')
  .then(r => r.json())
  .then(data => render(data))
  .catch(() => {
    const x = new XMLHttpRequest();
    x.open('GET', '../data/cs/programs-bank.json', true);
    x.onload = function() { render(JSON.parse(x.responseText)); };
    x.send();
  });

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(data) {
  const container = document.getElementById('programsContainer');
  const nav = document.getElementById('catNav');

  data.categories.forEach((cat, ci) => {
    const icon = ICONS[cat.name] || '💻';
    const slug = 'cat-' + ci;
    nav.innerHTML += `<a href="#${slug}">${icon} ${cat.name} (${cat.programs.length})</a>`;

    let html = `<div class="cat-section" id="${slug}">
      <div class="cat-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">
        <span class="cat-icon">${icon}</span>
        <span class="cat-title">${cat.name}</span>
        <span class="cat-count">${cat.programs.length} programs</span>
        <span class="cat-arrow">&#9660;</span>
      </div>
      <div class="cat-body">`;

    cat.programs.forEach((prog, pi) => {
      const freqClass = prog.frequency === 'Very High' ? 'badge-freq' : 'badge-freq-med';
      const codeId = `code-${ci}-${pi}`;
      const unrunnable = isTrulyUnrunnable(prog);
      const hasFileIO = needsFileIO(prog);
      const runnable = !unrunnable;
      const tryId = `try-${ci}-${pi}`;
      const fileId = `file-${ci}-${pi}`;
      const editorId = `editor-${ci}-${pi}`;
      const outputId = `output-${ci}-${pi}`;
      const compareId = `compare-${ci}-${pi}`;

      html += `<div class="prog-card">
        <div class="prog-header">
          <div class="prog-title">${escHtml(prog.title)}</div>
          <div class="prog-badges">
            <span class="badge badge-marks">${prog.marks} marks</span>
            <span class="badge ${freqClass}">${prog.frequency}</span>
          </div>
        </div>
        <div class="prog-desc">${escHtml(prog.description)}</div>
        <div class="btn-group">
          <button class="toggle-code" onclick="toggleSolution('${codeId}',this)">Show Solution</button>`;

      if (runnable) {
        html += `<button class="btn-try" onclick="toggleTryIt('${tryId}',this)">Try It Yourself</button>`;
      } else {
        html += `<button class="btn-try" disabled title="This program requires file I/O or modules not available in the browser">Try It Yourself</button>`;
      }

      html += `</div>`;

      /* Solution section (collapsed by default) */
      html += `<div class="code-section collapsed" id="${codeId}">
          <pre class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>${escHtml(prog.code)}</pre>`;
      if (prog.output) {
        html += `<div class="output-label">Expected Output:</div>
          <div class="output-block">${escHtml(prog.output)}</div>`;
      }
      if (prog.tips) {
        html += `<div class="tip-box"><strong>Examiner Tip:</strong> ${escHtml(prog.tips)}</div>`;
      }
      html += `</div>`;

      /* Try It Yourself section */
      if (runnable) {
        const skeleton = buildSkeleton(prog);
        const refOutput = prog.output || '';
        const filenames = hasFileIO ? extractFilenames(prog.code) : [];
        const firstFile = filenames[0] || 'sample.txt';
        const sampleContent = SAMPLE_FILES[firstFile] || SAMPLE_FILES[Object.keys(SAMPLE_FILES).find(k => k.toLowerCase() === firstFile.toLowerCase())] || 'This is sample file content.\nAdd your own text here.\nEach line represents a line in the file.';

        html += `<div class="try-it-section collapsed" id="${tryId}" data-ref-output="${escHtml(refOutput)}" data-ref-code="${escHtml(prog.code)}" data-has-file="${hasFileIO}" data-filename="${escHtml(firstFile)}">
          <div class="try-it-header">
            <span class="try-it-label">Code Editor</span>
            <div class="try-it-actions">
              <button class="btn-clear" onclick="clearEditor('${editorId}','${outputId}','${compareId}')">Clear</button>
              <button class="btn-peek" onclick="toggleSolution('${codeId}',null)">Peek Solution</button>
              <button class="btn-run" onclick="runEditorCode('${editorId}','${outputId}','${compareId}','${tryId}')">&#9654; Run Code</button>
            </div>
          </div>`;

        if (hasFileIO) {
          html += `<div class="file-content-wrap">
            <div class="file-content-header">
              <span class="file-content-label">📄 File: ${escHtml(firstFile)}</span>
              <span class="file-content-hint">Edit the file content below — your code will read from this</span>
            </div>
            <textarea class="file-content-area" id="${fileId}" spellcheck="false">${escHtml(sampleContent)}</textarea>
          </div>`;
        }

        html += `<textarea class="editor-area" id="${editorId}" spellcheck="false">${escHtml(skeleton)}</textarea>
          <div class="output-panel">
            <div class="output-panel-header">
              <span class="output-panel-label">Output</span>
            </div>
            <div class="output-content" id="${outputId}">Click "Run Code" to see output here.</div>
          </div>
          <div class="compare-panel collapsed" id="${compareId}">
            <div class="compare-col">
              <div class="compare-col-label yours">Your Output</div>
              <pre class="compare-yours"></pre>
            </div>
            <div class="compare-col">
              <div class="compare-col-label ref">Reference Output</div>
              <pre class="compare-ref"></pre>
            </div>
          </div>
        </div>`;
      } else {
        const reason = /\bimport\s+(pickle)/.test((prog.code||'').toLowerCase()) ? 'pickle module (binary files)' :
                        /\bimport\s+(csv)/.test((prog.code||'').toLowerCase()) ? 'csv module' :
                        /\b(mysql|cursor|execute)\b/.test((prog.code||'').toLowerCase()) ? 'MySQL database connectivity' :
                        'modules not available in browser';
        html += `<div class="no-run-note">
          <span class="note-icon">&#9432;</span>
          <span>This program uses <strong>${reason}</strong> — practice on your computer with Python installed. Study the solution code above.</span>
        </div>`;
      }

      html += `</div>`;
    });

    html += `</div></div>`;
    container.innerHTML += html;
  });
}

/* Toggle solution panel */
function toggleSolution(codeId, btn) {
  const el = document.getElementById(codeId);
  el.classList.toggle('collapsed');
  if (btn) {
    btn.textContent = el.classList.contains('collapsed') ? 'Show Solution' : 'Hide Solution';
  }
}

/* Toggle Try It Yourself panel */
function toggleTryIt(tryId, btn) {
  const el = document.getElementById(tryId);
  el.classList.toggle('collapsed');
  btn.textContent = el.classList.contains('collapsed') ? 'Try It Yourself' : 'Close Editor';
}

/* Clear editor and output */
function clearEditor(editorId, outputId, compareId) {
  document.getElementById(editorId).value = '# Write your code here\n';
  const out = document.getElementById(outputId);
  out.textContent = 'Click "Run Code" to see output here.';
  out.classList.remove('has-error');
  out.style.color = '';
  document.getElementById(compareId).classList.add('collapsed');
}

/* Run Python code with Skulpt */
function runPython(code, outputElementId) {
  return new Promise(function(resolve) {
    var output = document.getElementById(outputElementId);
    output.textContent = '';
    output.classList.remove('has-error');
    output.style.color = '';

    function outf(text) {
      output.textContent += text;
    }

    function builtinRead(x) {
      if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined) {
        throw "File not found: '" + x + "'";
      }
      return Sk.builtinFiles["files"][x];
    }

    Sk.configure({
      output: outf,
      read: builtinRead,
      __future__: Sk.python3,
      execLimit: 5000
    });

    var myPromise = Sk.misceval.asyncToPromise(function() {
      return Sk.importMainWithBody("<stdin>", false, code, true);
    });

    myPromise.then(function() {
      if (output.textContent === '') {
        output.textContent = '(No output)';
      }
      resolve(output.textContent);
    }, function(e) {
      output.textContent = 'Error: ' + e.toString();
      output.classList.add('has-error');
      output.style.color = '#fca5a5';
      resolve(null);
    });
  });
}

/* Virtual file system mock — prepended to code when program uses file I/O */
function buildVFSMock(filename, content) {
  // Escape content for Python string
  var escaped = content.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
  return `
class _VFile:
    def __init__(self, data, mode='r'):
        self._data = data
        self._lines = data.split('\\n')
        self._pos = 0
        self._mode = mode
        self._out = []
    def read(self, n=-1):
        if n == -1:
            r = self._data[self._pos:]
            self._pos = len(self._data)
            return r
        r = self._data[self._pos:self._pos+n]
        self._pos += n
        return r
    def readline(self):
        if self._pos >= len(self._data):
            return ''
        e = self._data.find('\\n', self._pos)
        if e == -1:
            ln = self._data[self._pos:]
            self._pos = len(self._data)
        else:
            ln = self._data[self._pos:e+1]
            self._pos = e + 1
        return ln
    def readlines(self):
        result = []
        while True:
            ln = self.readline()
            if not ln:
                break
            result.append(ln)
        return result
    def write(self, s):
        self._out.append(s)
        return len(s)
    def writelines(self, lines):
        for l in lines:
            self.write(l)
    def seek(self, pos, ref=0):
        if ref == 0:
            self._pos = pos
        elif ref == 1:
            self._pos += pos
        else:
            self._pos = len(self._data) + pos
    def tell(self):
        return self._pos
    def close(self):
        pass
    def __enter__(self):
        return self
    def __exit__(self, *a):
        pass
    def __iter__(self):
        return self
    def __next__(self):
        ln = self.readline()
        if not ln:
            raise StopIteration
        return ln

_vfs_data = {'` + filename + `': '` + escaped + `'}
_real_open = open
def open(name, mode='r'):
    for k in _vfs_data:
        if k.lower() == name.lower():
            return _VFile(_vfs_data[k], mode)
    return _VFile('', mode)

`;
}

/* Run code from editor and show comparison */
function runEditorCode(editorId, outputId, compareId, tryId) {
  var code = document.getElementById(editorId).value;
  var trySection = document.getElementById(tryId);
  var refOutput = trySection.getAttribute('data-ref-output');
  var hasFile = trySection.getAttribute('data-has-file') === 'true';
  var filename = trySection.getAttribute('data-filename') || 'sample.txt';

  // If this program uses file I/O, prepend the virtual file system
  if (hasFile) {
    var fileArea = trySection.querySelector('.file-content-area');
    if (fileArea) {
      var fileContent = fileArea.value;
      code = buildVFSMock(filename, fileContent) + code;
    }
  }

  runPython(code, outputId).then(function(userOutput) {
    if (userOutput === null) return; // Error occurred

    var comparePanel = document.getElementById(compareId);
    comparePanel.classList.remove('collapsed');

    var yoursEl = comparePanel.querySelector('.compare-yours');
    var refEl = comparePanel.querySelector('.compare-ref');

    yoursEl.textContent = userOutput;
    refEl.textContent = refOutput || '(No reference output)';

    /* Highlight match / mismatch */
    var normalizeStr = function(s) { return s.replace(/\s+/g,' ').trim(); };
    if (normalizeStr(userOutput) === normalizeStr(refOutput)) {
      yoursEl.className = 'compare-yours match';
      refEl.className = 'compare-ref match';
    } else {
      yoursEl.className = 'compare-yours mismatch';
      refEl.className = 'compare-ref';
    }
  });
}

function copyCode(btn) {
  const pre = btn.parentElement;
  const code = pre.textContent.replace('Copy', '').trim();
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}
</script>
